name: "PR Title Linter"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # (선택 사항) PR 제목에 포함될 수 있는 Type을 커스텀할 수 있습니다.
          # 설정하지 않으면 기본 Conventional Commits 룰이 적용됩니다.
          # types: |
          #   feat
          #   fix
          #   chore
          #   docs
          #   style
          #   refactor
          #   test
